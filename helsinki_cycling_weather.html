<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helsinki Cycling Weather</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --text: #1a1a18;
    --text-muted: #6b6b69;
    --text-hint: #9b9b99;
    --border: rgba(0,0,0,0.12);
    --radius-md: 8px;
    --radius-lg: 12px;
    --green-bg: #EAF3DE; --green-text: #27500A;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --red-bg: #FCEBEB; --red-text: #791F1F;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg-secondary: #2a2a28;
      --text: #f0f0ee;
      --text-muted: #9b9b99;
      --text-hint: #6b6b69;
      --border: rgba(255,255,255,0.12);
      --green-bg: #173404; --green-text: #C0DD97;
      --amber-bg: #412402; --amber-text: #FAC775;
      --red-bg: #501313; --red-text: #F7C1C1;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
  }
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    max-width: 480px;
    margin: 0 auto;
  }
  .verdict { border-radius: var(--radius-md); padding: 8px 14px; text-align: center; font-size: 13px; font-weight: 500; }
  .verdict-good { background: var(--green-bg); color: var(--green-text); }
  .verdict-caution { background: var(--amber-bg); color: var(--amber-text); }
  .verdict-bad { background: var(--red-bg); color: var(--red-text); }
  .tag { font-size: 11px; border: 0.5px solid var(--border); border-radius: 999px; padding: 2px 8px; display: inline-block; margin: 2px; color: var(--text-muted); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; }
  .stat-val { font-size: 20px; font-weight: 500; color: var(--text); }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; display: inline-block; margin-top: 4px; }
  .pill-ok { background: var(--green-bg); color: var(--green-text); }
  .pill-bad { background: var(--red-bg); color: var(--red-text); }
  hr { border: none; border-top: 0.5px solid var(--border); margin: 14px 0; }
  .updated { font-size: 11px; color: var(--text-hint); margin-top: 10px; }
  .spinner { display: flex; align-items: center; justify-content: center; height: 100px; color: var(--text-muted); font-size: 14px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 3px; }
</style>
</head>
<body>
<div class="card">
  <div id="content"><div class="spinner">Loading Helsinki weather...</div></div>
</div>

<script>
const PREFS = {
  minTemp: -10, winterPantsTemp: -5,
  comfortTempCalm: 5, comfortTempWindy: 10,
  maxWind: 5, maxGust: 10,
  rainOk: true, snowOk: true
};

function wmoDesc(c) {
  if (c === 0) return { label: 'Clear', icon: '☀️' };
  if (c <= 2) return { label: 'Partly cloudy', icon: '⛅' };
  if (c === 3) return { label: 'Overcast', icon: '☁️' };
  if (c <= 49) return { label: 'Foggy', icon: '🌫️' };
  if (c <= 57) return { label: 'Drizzle', icon: '🌦️' };
  if (c <= 65) return { label: 'Rain', icon: '🌧️' };
  if (c <= 77) return { label: 'Snow', icon: '❄️' };
  if (c <= 82) return { label: 'Showers', icon: '🌧️' };
  if (c <= 86) return { label: 'Snow showers', icon: '🌨️' };
  if (c <= 99) return { label: 'Thunderstorm', icon: '⛈️' };
  return { label: 'Unknown', icon: '?' };
}
function isRainy(c) { return (c>=51&&c<=67)||(c>=80&&c<=82)||c>=95; }
function isSnowy(c) { return (c>=71&&c<=77)||(c>=85&&c<=86); }

function evaluate(temp, wind, gust, wmo) {
  const tips = []; let score = 'good';
  if (temp < PREFS.minTemp) return { score: 'bad', label: 'Stay inside', tips: ['Too cold'] };
  if (wind >= PREFS.maxWind) { score = 'caution'; tips.push('Strong wind'); }
  if (gust >= PREFS.maxGust) { score = 'caution'; tips.push('Gusty'); }
  const isWindy = wind >= PREFS.maxWind;
  if (temp < (isWindy ? PREFS.comfortTempWindy : PREFS.comfortTempCalm)) { if (score==='good') score='caution'; tips.push('Dress warmly'); }
  if (temp < PREFS.winterPantsTemp) tips.push('Winter pants');
  if (isRainy(wmo)) { if (score==='good') score='caution'; tips.push('Light rain — waterproof up'); }
  if (isSnowy(wmo)) { if (score==='good') score='caution'; tips.push('Snow — studded tires'); }
  if (!tips.length) tips.push('Great conditions');
  const labels = { good:'Good to go', caution:'With caution', bad:'Skip today' };
  return { score, label: labels[score], tips };
}

function tempColor(t) {
  if (t < -5) return '#85B7EB';
  if (t < 5) return '#9FE1CB';
  if (t < 15) return '#97C459';
  return '#EF9F27';
}

function render(data) {
  const now = new Date();
  const idx = Math.max(0, data.hourly.time.findIndex(t => new Date(t) >= now));
  const temp = data.hourly.temperature_2m[idx];
  const wind = data.hourly.wind_speed_10m[idx];
  const gust = data.hourly.wind_gusts_10m[idx];
  const wmo = data.hourly.weather_code[idx];
  const humidity = data.hourly.relative_humidity_2m[idx];
  const { score, label, tips } = evaluate(temp, wind, gust, wmo);
  const { label: wLabel, icon } = wmoDesc(wmo);
  const updatedStr = now.toLocaleTimeString('fi-FI', { hour:'2-digit', minute:'2-digit' });

  const hours = [];
  for (let i = 0; i < 12; i++) {
    const j = idx + i;
    if (j >= data.hourly.time.length) break;
    const hr = new Date(data.hourly.time[j]).getHours();
    const t = data.hourly.temperature_2m[j];
    const w = data.hourly.wind_speed_10m[j];
    const g = data.hourly.wind_gusts_10m[j];
    const c = data.hourly.weather_code[j];
    const ev = evaluate(t, w, g, c);
    hours.push({ hr, temp: t, score: ev.score });
  }

  const dotColors = { good:'#639922', caution:'#BA7517', bad:'#E24B4A' };

  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
      <div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">Helsinki · now</div>
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-size:42px;font-weight:500;">${Math.round(temp)}°</span>
          <span style="font-size:26px;">${icon}</span>
        </div>
        <div style="font-size:13px;color:var(--text-muted);">${wLabel}</div>
      </div>
      <div style="text-align:right;">
        <div class="verdict verdict-${score}">${label}</div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;justify-content:flex-end;gap:3px;">
          ${tips.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
    <hr>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
      <div>
        <div class="stat-label">Wind</div>
        <div class="stat-val">${Math.round(wind)} <span style="font-size:13px;font-weight:400;color:var(--text-muted);">m/s</span></div>
        <span class="pill ${wind < PREFS.maxWind ? 'pill-ok' : 'pill-bad'}">${wind < PREFS.maxWind ? 'calm' : 'strong'}</span>
      </div>
      <div>
        <div class="stat-label">Gusts</div>
        <div class="stat-val">${Math.round(gust)} <span style="font-size:13px;font-weight:400;color:var(--text-muted);">m/s</span></div>
        <span class="pill ${gust < PREFS.maxGust ? 'pill-ok' : 'pill-bad'}">${gust < PREFS.maxGust ? 'ok' : 'gusty'}</span>
      </div>
      <div>
        <div class="stat-label">Humidity</div>
        <div class="stat-val">${Math.round(humidity)}<span style="font-size:13px;font-weight:400;color:var(--text-muted);">%</span></div>
      </div>
    </div>
    <hr>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">Next 12 hours</div>
    <div style="display:flex;gap:4px;align-items:flex-end;height:64px;">
      ${hours.map(h => {
        const barH = Math.max(4, Math.min(44, (h.temp + 20) * 1.4));
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;">
          <div style="width:100%;flex:1;display:flex;align-items:flex-end;">
            <div style="width:100%;height:${barH}px;background:${tempColor(h.temp)};border-radius:2px;opacity:0.75;"></div>
          </div>
          <div style="width:8px;height:8px;border-radius:50%;background:${dotColors[h.score]};"></div>
          <div style="font-size:9px;color:var(--text-muted);">${h.hr}h</div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text-muted);">
      <span><span class="dot" style="background:#639922;"></span>Good</span>
      <span><span class="dot" style="background:#BA7517;"></span>Caution</span>
      <span><span class="dot" style="background:#E24B4A;"></span>Skip</span>
    </div>
    <div class="updated">Updated ${updatedStr} · refreshes every 30 min</div>
  `;
}

async function load() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=60.1699&longitude=24.9384&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_gusts_10m,weather_code&wind_speed_unit=ms&forecast_days=2&timezone=Europe%2FHelsinki';
    const res = await fetch(url);
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="spinner">Could not load weather data</div>';
  }
}

load();
setInterval(load, 30 * 60 * 1000);
</script>
</body>
</html>
