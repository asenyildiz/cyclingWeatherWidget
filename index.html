<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helsinki Cycling Weather</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3;
    --text: #1a1a18; --text2: #6b6b69; --text3: #9b9b99;
    --border: rgba(0,0,0,0.12);
    --r-md: 8px; --r-lg: 12px;
    --darkgreen-bg:#156C08; --darkgreen-tx:#000000;
    --green-bg:#AFDD3C; --green-tx:#000000;
    --orange-bg:#E4C142; --orange-tx:#000000;
    --amber-bg:#DD923C; --amber-tx:#000000;
    --red-bg:#E15353;   --red-tx:#FFFFFF;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1e1e1c; --bg2:#2a2a28; --text:#f0f0ee; --text2:#9b9b99; --text3:#6b6b69;
      --border:rgba(255,255,255,0.12);
      --darkgreen-bg:#156C08; --darkgreen-tx:#FFFFFF;
      --green-bg:#AFDD3C; --green-tx:#000000;
      --orange-bg:#E4C142; --orange-tx:#000000;
      --amber-bg:#DD923C; --amber-tx:#000000;
      --red-bg:#E15353;   --red-tx:#FFFFFF;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 12px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 16px; margin-bottom: 10px; }
  hr { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }
  .label { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .val { font-size: 18px; font-weight: 500; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; display: inline-block; margin-top: 3px; }
  .p-ok  { background: var(--green-bg); color: var(--green-tx); }
  .p-bad { background: var(--red-bg);   color: var(--red-tx); }
  .gear-row { font-size: 12px; color: var(--text2); padding: 3px 0; display: flex; align-items: center; gap: 6px; }
  .gear-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .day-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
  .day-row:last-child { border-bottom: none; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .updated { font-size: 11px; color: var(--text3); margin-top: 10px; }
</style>
</head>
<body>

<div class="card" id="now-card">
  <div style="font-size:13px;color:var(--text2);padding:30px 0;text-align:center;">Loading weather…</div>
</div>

<div class="card" id="week-card">
  <div style="font-size:13px;color:var(--text2);padding:20px 0;text-align:center;">Loading forecast…</div>
</div>

<script>
const P = { minTemp:-10, winterPants:-5, comfortCalm:5, comfortWindy:10, maxWind:5, maxGust:10 };

const LEVELS = [
  { n:5, label:'Perfect',      bg:'var(--darkgreen-bg)', tx:'var(--darkgreen-tx)' },
  { n:4, label:'Good',         bg:'var(--green-bg)', tx:'var(--green-tx)' },
  { n:3, label:'With caution', bg:'var(--orange-bg)', tx:'var(--orange-tx)' },
  { n:2, label:'Not ideal',    bg:'var(--amber-bg)', tx:'var(--amber-tx)' },
  { n:1, label:'Skip today',   bg:'var(--red-bg)',   tx:'var(--red-tx)'   },
];

function getScore(temp, wind, gust, wmo) {
  if (temp < P.minTemp) return 1;
  const isWindy = wind >= P.maxWind;
  const threshold = isWindy ? P.comfortWindy : P.comfortCalm;
  const rainy = (wmo>=51&&wmo<=67)||(wmo>=80&&wmo<=82)||wmo>=95;
  const snowy = (wmo>=71&&wmo<=77)||(wmo>=85&&wmo<=86);
  let pen = 0;
  if (wind >= P.maxWind || gust >= P.maxGust) pen++;
  if (rainy)  pen++;
  if (snowy)  pen++;
  if (temp < threshold) pen++;
  if (temp < P.winterPants) pen++;
  return Math.max(1, 5 - pen);
}

function lv(n) { return LEVELS.find(l => l.n === n); }

// Returns the label, appending "... but cold" if score >= 4 and temp < 5
function getLabel(score, temp) {
  const l = lv(score);
  if (temp < P.comfortCalm && score >= 4) {
    return { ...l, label: l.label + ' · but cold' };
  }
  return l;
}

function getGear(temp, wind, wmo) {
  if (temp < P.minTemp) return ['Too cold — stay inside'];
  const g = [];
  const rainy = (wmo>=51&&wmo<=67)||(wmo>=80&&wmo<=82)||wmo>=95;
  const snowy = (wmo>=71&&wmo<=77)||(wmo>=85&&wmo<=86);
  if (temp < P.winterPants)      g.push('Winter pants');
  else if (temp < P.comfortCalm) g.push('Thermal tights');
  if (temp < 0)                  g.push('Insulated gloves & balaclava');
  else if (temp < 5)             g.push('Gloves & warm hat');
  if (temp < 5)                  g.push('Winter jacket');
  else if (temp < 10)            g.push('Fleece or light jacket');
  else                           g.push('Regular cycling kit');
  if (rainy)                     g.push('Waterproof jacket');
  if (snowy)                     g.push('Studded tires');
  if (wind >= P.maxWind)         g.push('Windproof outer layer');
  return g;
}

function wmoIcon(c) {
  if(c===0)return'☀️';if(c<=2)return'⛅';if(c===3)return'☁️';
  if(c<=49)return'🌫️';if(c<=57)return'🌦️';if(c<=65)return'🌧️';
  if(c<=77)return'❄️';if(c<=82)return'🌧️';if(c<=86)return'🌨️';
  return'⛈️';
}

// Precipitation bar color: blue shades by intensity
function precipColor(mm) {
  if (mm <= 0)   return 'var(--border)';
  if (mm < 0.5)  return '#B3D9F7';
  if (mm < 2)    return '#6AB4EE';
  if (mm < 5)    return '#2F86D4';
  return '#1255A0';
}

function formatSunset(isoString) {
  if (!isoString) return '—';
  const d = new Date(isoString);
  return d.toLocaleTimeString('fi-FI', { hour: '2-digit', minute: '2-digit' });
}

function renderNow(d) {
  const now = new Date();
  let i = d.hourly.time.findIndex(t => new Date(t) >= now);
  if (i < 0) i = 0;
  const temp    = d.hourly.temperature_2m[i];
  const wind    = d.hourly.wind_speed_10m[i];
  const gust    = d.hourly.wind_gusts_10m[i];
  const wmo     = d.hourly.weather_code[i];
  const hum     = d.hourly.relative_humidity_2m[i];
  const feelsLike = d.hourly.apparent_temperature[i];

  const sc = getScore(temp, wind, gust, wmo);
  const l  = getLabel(sc, temp);
  const gr = getGear(temp, wind, wmo);
  const ts = now.toLocaleTimeString('fi-FI', { hour: '2-digit', minute: '2-digit' });

  // Sunset from daily data (today = index 0)
  const sunsetStr = d.daily && d.daily.sunset ? formatSunset(d.daily.sunset[0]) : '—';

  // Build 24-hour bars from now, grouped into 2-hour buckets (12 bars total)
  const hrs = [];
  const MAX_BAR_MM = 5; // mm — cap for bar scaling
  const BAR_MAX_HEIGHT = 38; // px
  for (let k = 0; k < 24; k += 2) {
    const j  = i + k;
    const j2 = i + k + 1;
    if (j >= d.hourly.time.length) break;
    const hr    = new Date(d.hourly.time[j]).getHours();
    // Average feels-like across both hours
    const fl1   = d.hourly.apparent_temperature[j];
    const fl2   = j2 < d.hourly.time.length ? d.hourly.apparent_temperature[j2] : fl1;
    const flAvg = (fl1 + fl2) / 2;
    // Average temp for scoring
    const t1    = d.hourly.temperature_2m[j];
    const t2    = j2 < d.hourly.time.length ? d.hourly.temperature_2m[j2] : t1;
    const tAvg  = (t1 + t2) / 2;
    // Worst wind/gust for scoring
    const w     = Math.max(d.hourly.wind_speed_10m[j],  j2 < d.hourly.time.length ? d.hourly.wind_speed_10m[j2]  : 0);
    const g2    = Math.max(d.hourly.wind_gusts_10m[j],  j2 < d.hourly.time.length ? d.hourly.wind_gusts_10m[j2]  : 0);
    const c     = d.hourly.weather_code[j];
    // Sum precipitation across both hours
    const precip = (d.hourly.precipitation[j] || 0) + (j2 < d.hourly.time.length ? (d.hourly.precipitation[j2] || 0) : 0);
    const l2    = lv(getScore(tAvg, w, g2, c));
    const bh    = precip > 0
      ? Math.max(6, Math.min(BAR_MAX_HEIGHT, (precip / MAX_BAR_MM) * BAR_MAX_HEIGHT))
      : 4;
    hrs.push({ hr, feelsLike: flAvg, precip, bh, barColor: precipColor(precip), dotBg: l2.bg });
  }

  const barSection = hrs.map(h => {
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0;">
      <div style="font-size:8px;color:var(--text2);line-height:1;text-align:center;">${Math.round(h.feelsLike)}°</div>
      <div style="width:100%;flex:1;display:flex;align-items:flex-end;">
        <div style="width:100%;height:${h.bh}px;background:${h.barColor};border-radius:2px;"></div>
      </div>
      <div style="width:7px;height:7px;border-radius:50%;background:${h.dotBg};border:0.5px solid var(--border);flex-shrink:0;"></div>
      <div style="font-size:8px;color:var(--text3);">${h.hr}h</div>
    </div>`;
  }).join('');

  document.getElementById('now-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div style="font-size:11px;color:var(--text2);">Helsinki · now</div>
      <div style="font-size:11px;color:var(--text2);">🌇 Sunset ${sunsetStr}</div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <span style="font-size:48px;font-weight:500;line-height:1;">${Math.round(temp)}°</span>
      <span style="font-size:30px;line-height:1;">${wmoIcon(wmo)}</span>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px;">Feels like ${Math.round(feelsLike)}°</div>

    <div style="background:${l.bg};border-radius:var(--r-md);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <span style="font-size:15px;font-weight:500;color:${l.tx};">${l.label}</span>
      <span style="font-size:12px;color:${l.tx};opacity:0.75;">${sc} / 5</span>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px;">
      <div>
        <div class="label">Wind</div>
        <div class="val">${Math.round(wind)}<span style="font-size:12px;font-weight:400;color:var(--text2);"> m/s</span></div>
        <span class="pill ${wind<P.maxWind?'p-ok':'p-bad'}">${wind<P.maxWind?'calm':'strong'}</span>
      </div>
      <div>
        <div class="label">Gusts</div>
        <div class="val">${Math.round(gust)}<span style="font-size:12px;font-weight:400;color:var(--text2);"> m/s</span></div>
        <span class="pill ${gust<P.maxGust?'p-ok':'p-bad'}">${gust<P.maxGust?'ok':'gusty'}</span>
      </div>
      <div>
        <div class="label">Humidity</div>
        <div class="val">${Math.round(hum)}<span style="font-size:12px;font-weight:400;color:var(--text2);">%</span></div>
      </div>
    </div>

    <hr>

    <div style="font-size:12px;font-weight:500;margin-bottom:7px;">What to wear</div>
    ${gr.map(g=>`<div class="gear-row"><div class="gear-dot"></div>${g}</div>`).join('')}

    <hr>

    <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">Next 24 hours</div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:8px;">Each bar = 2 h · height = precipitation (mm) · °C = feels-like · dot = cycling score</div>
    <div style="display:flex;gap:2px;align-items:flex-end;height:74px;">
      ${barSection}
    </div>

    <div class="updated">Updated ${ts} · refreshes every 30 min</div>
  `;
}

function renderWeek(d) {
  const day=d.daily, names=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const rows=day.time.map((ds,i)=>{
    const name=i===0?'Today':i===1?'Tomorrow':names[new Date(ds).getDay()];
    const tmax=day.temperature_2m_max[i], tmin=day.temperature_2m_min[i];
    const wind=day.wind_speed_10m_max[i], gust=day.wind_gusts_10m_max[i], wmo=day.weather_code[i];
    const avgTemp=(tmax+tmin)/2;
    const sc=getScore(avgTemp,wind,gust,wmo);
    const l=getLabel(sc,avgTemp);
    return `<div class="day-row">
      <div style="width:76px;flex-shrink:0;font-size:13px;font-weight:500;">${name}</div>
      <div style="font-size:18px;flex-shrink:0;width:26px;line-height:1;">${wmoIcon(wmo)}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;">${Math.round(tmin)}° – ${Math.round(tmax)}°</div>
        <div style="font-size:11px;color:var(--text2);">wind ${Math.round(wind)} m/s</div>
      </div>
      <span class="badge" style="background:${l.bg};color:${l.tx};">${l.label}</span>
    </div>`;
  });

  document.getElementById('week-card').innerHTML = `
    <div style="font-size:12px;font-weight:500;margin-bottom:8px;">7-day forecast</div>
    ${rows.join('')}
    <hr>
    <div style="display:flex;flex-wrap:wrap;gap:5px;">
      ${LEVELS.map(l=>`<span style="font-size:10px;background:${l.bg};color:${l.tx};padding:2px 8px;border-radius:999px;">${l.n} · ${l.label}</span>`).join('')}
    </div>
  `;
}

async function load() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=60.1699&longitude=24.9384'
      + '&hourly=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_gusts_10m,weather_code,precipitation'
      + '&daily=temperature_2m_max,temperature_2m_min,wind_speed_10m_max,wind_gusts_10m_max,weather_code,sunset'
      + '&wind_speed_unit=ms&forecast_days=7&timezone=Europe%2FHelsinki';
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderNow(data);
    renderWeek(data);
  } catch(e) {
    document.getElementById('now-card').innerHTML = '<div style="text-align:center;padding:24px 0;font-size:13px;color:var(--text2);">Could not load weather &nbsp;<button onclick="load()" style="font-size:12px;padding:3px 10px;border:0.5px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;">Retry</button></div>';
    document.getElementById('week-card').innerHTML = '';
  }
}
load();
setInterval(load, 30*60*1000);
</script>
</body>
</html>
